services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - dashboard
    restart: unless-stopped
    networks:
      - market-pulse-net

  api:
    image: ${ECR_REGISTRY:-market-pulse-api}:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-market_pulse}
      MODEL_REGISTRY_PATH: /app/models
      TARGET_TICKERS: ${TARGET_TICKERS:-AAPL,MSFT,GOOGL,AMZN,TSLA,SPY}
    restart: unless-stopped
    networks:
      - market-pulse-net

  dashboard:
    image: ${ECR_REGISTRY_DASHBOARD:-market-pulse-dashboard}:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000/api/v1}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - market-pulse-net

networks:
  market-pulse-net:
    driver: bridge
