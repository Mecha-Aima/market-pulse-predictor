name: CD - Build and Deploy

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY_API: market-pulse-api
  ECR_REPOSITORY_DASHBOARD: market-pulse-dashboard
  ECR_REPOSITORY_TRAINING: market-pulse-training

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    outputs:
      api-image: ${{ steps.build-api.outputs.image }}
      dashboard-image: ${{ steps.build-dashboard.outputs.image }}
      training-image: ${{ steps.build-training.outputs.image }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push API image
        id: build-api
        run: |
          IMAGE_TAG="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_API }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_API }}:latest"
          
          docker build \
            -t $IMAGE_TAG \
            -t $IMAGE_LATEST \
            -f docker/Dockerfile.api \
            .
          
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST
          
          echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT
      
      - name: Build and push Dashboard image
        id: build-dashboard
        run: |
          IMAGE_TAG="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_DASHBOARD }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_DASHBOARD }}:latest"
          
          docker build \
            -t $IMAGE_TAG \
            -t $IMAGE_LATEST \
            -f docker/Dockerfile.dashboard \
            .
          
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST
          
          echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT
      
      - name: Build and push Training image
        id: build-training
        run: |
          IMAGE_TAG="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_TRAINING }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_TRAINING }}:latest"
          
          docker build \
            -t $IMAGE_TAG \
            -t $IMAGE_LATEST \
            -f docker/Dockerfile.training \
            .
          
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST
          
          echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            
            # Navigate to app directory
            cd /app/market-pulse-predictor
            
            # Pull latest code
            git pull origin main
            
            # Configure AWS CLI
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_DEFAULT_REGION="${{ env.AWS_REGION }}"
            
            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            
            # Pull new images
            docker pull ${{ needs.build-and-push.outputs.api-image }}
            docker pull ${{ needs.build-and-push.outputs.dashboard-image }}
            docker pull ${{ needs.build-and-push.outputs.training-image }}
            
            # Tag as latest
            docker tag ${{ needs.build-and-push.outputs.api-image }} market-pulse-api:latest
            docker tag ${{ needs.build-and-push.outputs.dashboard-image }} market-pulse-dashboard:latest
            docker tag ${{ needs.build-and-push.outputs.training-image }} market-pulse-training:latest
            
            # Run deployment script
            bash scripts/deploy_to_ec2.sh
          ENDSSH
      
      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 30
          
          # Check API health
          API_HEALTH=$(curl -f -s http://${{ secrets.EC2_HOST }}:8000/health || echo "failed")
          if [[ "$API_HEALTH" == "failed" ]]; then
            echo "API health check failed"
            exit 1
          fi
          
          echo "API health check passed"
          echo "Dashboard available at: http://${{ secrets.EC2_HOST }}:8501"
      
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, initiating rollback..."
          
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            
            cd /app/market-pulse-predictor
            
            # Rollback to previous version
            docker-compose -f docker-compose.prod.yml down
            
            # Pull previous images (tagged as previous)
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_API }}:previous || true
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_DASHBOARD }}:previous || true
            
            # Tag as latest
            docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_API }}:previous market-pulse-api:latest || true
            docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_DASHBOARD }}:previous market-pulse-dashboard:latest || true
            
            # Restart services
            docker-compose -f docker-compose.prod.yml up -d
          ENDSSH
          
          echo "Rollback completed"
          exit 1
      
      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
