name: Test Secrets Access

# This workflow tests that all required secrets are accessible
# Run manually to verify secrets are configured correctly

on:
  workflow_dispatch:

jobs:
  test-secrets:
    name: Test Secret Access
    runs-on: ubuntu-latest
    
    steps:
      - name: Test AWS Access Key ID
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "❌ AWS_ACCESS_KEY_ID is not set"
            exit 1
          fi
          echo "✅ AWS_ACCESS_KEY_ID is set"
      
      - name: Test AWS Secret Access Key
        run: |
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "❌ AWS_SECRET_ACCESS_KEY is not set"
            exit 1
          fi
          echo "✅ AWS_SECRET_ACCESS_KEY is set"
      
      - name: Test AWS Account ID
        run: |
          if [ -z "${{ secrets.AWS_ACCOUNT_ID }}" ]; then
            echo "❌ AWS_ACCOUNT_ID is not set"
            exit 1
          fi
          echo "✅ AWS_ACCOUNT_ID is set"
      
      - name: Test EC2 Host
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "❌ EC2_HOST is not set"
            exit 1
          fi
          echo "✅ EC2_HOST is set"
      
      - name: Test EC2 User
        run: |
          if [ -z "${{ secrets.EC2_USER }}" ]; then
            echo "❌ EC2_USER is not set"
            exit 1
          fi
          echo "✅ EC2_USER is set"
      
      - name: Test EC2 SSH Private Key
        run: |
          if [ -z "${{ secrets.EC2_SSH_PRIVATE_KEY }}" ]; then
            echo "❌ EC2_SSH_PRIVATE_KEY is not set"
            exit 1
          fi
          echo "✅ EC2_SSH_PRIVATE_KEY is set"
      
      - name: Test AWS Credentials Validity
        run: |
          # Configure AWS credentials
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export AWS_DEFAULT_REGION="us-east-1"
          
          # Install AWS CLI
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install
          
          # Test credentials by calling STS
          if aws sts get-caller-identity > /dev/null 2>&1; then
            echo "✅ AWS credentials are valid"
          else
            echo "❌ AWS credentials are invalid or lack permissions"
            exit 1
          fi
      
      - name: Test ECR Access
        run: |
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export AWS_DEFAULT_REGION="us-east-1"
          
          # Test ECR login
          if aws ecr get-login-password --region us-east-1 > /dev/null 2>&1; then
            echo "✅ ECR access is working"
          else
            echo "❌ ECR access failed"
            exit 1
          fi
      
      - name: Test SSH Key Format
        run: |
          # Write SSH key to file
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > test_key.pem
          
          # Check if key has proper format
          if grep -q "BEGIN.*PRIVATE KEY" test_key.pem && grep -q "END.*PRIVATE KEY" test_key.pem; then
            echo "✅ SSH private key has correct format"
          else
            echo "❌ SSH private key format is invalid"
            exit 1
          fi
          
          # Set proper permissions
          chmod 600 test_key.pem
          
          # Validate key format with ssh-keygen
          if ssh-keygen -l -f test_key.pem > /dev/null 2>&1; then
            echo "✅ SSH private key is valid"
          else
            echo "❌ SSH private key is invalid"
            exit 1
          fi
          
          # Cleanup
          rm -f test_key.pem
      
      - name: Summary
        if: success()
        run: |
          echo "================================================"
          echo "✅ All secrets are configured correctly!"
          echo "================================================"
          echo ""
          echo "You can now run the CD workflow to deploy."
          echo ""
          echo "Next steps:"
          echo "1. Ensure ECR repositories exist:"
          echo "   - market-pulse-api"
          echo "   - market-pulse-dashboard"
          echo "   - market-pulse-training"
          echo ""
          echo "2. Ensure EC2 instance is running and accessible"
          echo ""
          echo "3. Push to main branch to trigger CD workflow"
