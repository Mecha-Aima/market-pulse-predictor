x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    PYTHONPATH: /opt/airflow:/opt/airflow/src
    # MLflow — points to Railway production instance
    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-market_pulse}
    MODEL_REGISTRY_PATH: /opt/airflow/models
    # Data pipeline env
    TARGET_TICKERS: ${TARGET_TICKERS:-AAPL,MSFT,GOOGL,AMZN,TSLA,SPY}
    # AWS credentials for DVC push and S3 artifact access
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    # Reddit scraper credentials
    REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
    REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET}
    REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-market-pulse-predictor/1.0}
    # Git identity for DVC auto-commits from Airflow tasks
    GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-Airflow Bot}
    GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-airflow@market-pulse.local}
    GIT_COMMITTER_NAME: ${GIT_AUTHOR_NAME:-Airflow Bot}
    GIT_COMMITTER_EMAIL: ${GIT_AUTHOR_EMAIL:-airflow@market-pulse.local}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./models:/opt/airflow/models
    - ./params.yaml:/opt/airflow/params.yaml:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate && airflow users create
        --username admin --password admin --firstname Admin
        --lastname User --role Admin --email admin@market-pulse.local"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: unless-stopped

volumes:
  airflow-postgres-data:
