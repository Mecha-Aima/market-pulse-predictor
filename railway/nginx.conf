worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Use /tmp for writable paths (Railway runs as non-root)
    client_body_temp_path /tmp/nginx_client_temp;
    proxy_temp_path       /tmp/nginx_proxy_temp;
    fastcgi_temp_path     /tmp/nginx_fastcgi_temp;
    uwsgi_temp_path       /tmp/nginx_uwsgi_temp;
    scgi_temp_path        /tmp/nginx_scgi_temp;

    access_log /var/log/nginx/access.log;
    sendfile   on;
    keepalive_timeout 65;

    server {
        listen __PORT__;

        # ── Root cause fix ────────────────────────────────────────────────────
        # Flask's app is initialised with static_folder="js/build".
        # Flask registers a built-in /static/<path> route which intercepts
        # send_from_directory() calls whose path starts with "static/".
        # Result: /static-files/index.html → 200, but
        #         /static-files/static/js/*.js → 404 (Flask's /static/ wins).
        #
        # Fix: nginx serves /static-files/static/ directly from the filesystem
        # so Flask never sees those requests. All other paths proxy to MLflow.
        # ─────────────────────────────────────────────────────────────────────

        # Serve JS/CSS/media directly — these are the files Flask can't serve
        location /static-files/static/ {
            alias __MLFLOW_STATIC_DIR__/static/;
            expires 28d;
            add_header Cache-Control "public, immutable";
            add_header X-Served-By "nginx-direct";
        }

        # Proxy everything else (/, /static-files/index.html, /api/*, /ajax-api/*, /health, etc.)
        location / {
            proxy_pass         http://127.0.0.1:5001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }
    }
}
