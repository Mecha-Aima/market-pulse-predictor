[build]
builder = "DOCKERFILE"
dockerfilePath = "railway/Dockerfile.mlflow"

[deploy]
# No startCommand override — Dockerfile CMD (/app/debug-start.sh) is used.
# The start script removes --serve-artifacts (which caused /static-files 404)
# and adds --gunicorn-opts for stability.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
