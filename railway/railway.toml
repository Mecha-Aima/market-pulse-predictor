[build]
builder = "DOCKERFILE"
dockerfilePath = "railway/Dockerfile.mlflow"

[deploy]
startCommand = "mlflow server --host 0.0.0.0 --port $PORT --backend-store-uri $DATABASE_URL --default-artifact-root $ARTIFACT_ROOT"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
