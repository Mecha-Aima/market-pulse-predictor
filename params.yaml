ingestion:
  target_tickers: "AAPL,MSFT,GOOGL,AMZN,TSLA,SPY"
  lookback_hours: 24

sentiment:
  method: "vader"

features:
  sequence_length: 10  # 10 trading days (2 calendar weeks) per sequence
  train_ratio: 0.70
  val_ratio: 0.15

training:
  epochs: 50
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  hidden_size: 64
  num_layers: 2
  dropout: 0.4
  early_stopping_patience: 10
  task: "direction"
  model: "lstm"
  device: "auto"

